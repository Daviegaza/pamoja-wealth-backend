# fly.toml — Pamoja Wealth Backend
# Deploy: flyctl deploy

app = "pamoja-wealth-api"
primary_region = "jnb"  # Johannesburg (closest to East Africa)

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  NODE_ENV = "production"

[[services]]
  protocol = "tcp"
  internal_port = 3000
  processes = ["app"]

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 1000
    soft_limit = 500

  [[services.http_checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "30s"
    method = "get"
    path = "/api/v1/health"
    protocol = "http"

# Worker machine — runs BullMQ job processors
[[services]]
  protocol = "tcp"
  internal_port = 3001
  processes = ["worker"]

  [[services.ports]]
    port = 3001
    handlers = []

  [[services.http_checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "45s"
    method = "get"
    path = "/api/v1/health"
    protocol = "http"

# Processes
[processes]
  app = "node dist/index.js"
  worker = "node dist/jobs/workers/index.js"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
